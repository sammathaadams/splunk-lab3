  <text x="130" y="285" font-size="10" fill="#444">Active Directory Domain Controller</text>
  <text x="86" y="300" font-size="10" font-weight="700" fill="#1a2340">Logs:</text>
  <text x="130" y="300" font-size="10" fill="#444">Security · System · Application</text>
