  <text x="487" y="257" text-anchor="middle" font-size="11" font-weight="700" fill="white">🔍  Splunk Web UI — SPL</text>
  <text x="394" y="285" font-size="9" font-weight="700" fill="#1a2340">Search &amp; Reporting App</text>
  <text x="394" y="300" font-size="8.5" fill="#444">index=windows_logs | head 100</text>
  <text x="394" y="316" font-size="9" font-weight="700" fill="#1a2340">Failed Logins (4625)</text>
  <text x="394" y="330" font-size="8" fill="#444">EventCode=4625 | stats count</text>
  <text x="394" y="342" font-size="8" fill="#444">by Account_Name | sort -count</text>
  <text x="394" y="358" font-size="9" font-weight="700" fill="#1a2340">Account Lockouts (4740)</text>
  <text x="394" y="372" font-size="8" fill="#444">EventCode=4740 | table _time,</text>
  <text x="394" y="384" font-size="8" fill="#444">Account_Name, Caller_Computer_Name</text>
  <text x="394" y="400" font-size="9" font-weight="700" fill="#1a2340">After-Hours Logins</text>
  <text x="394" y="414" font-size="8" fill="#444">EventCode=4624 | eval hour=</text>
  <text x="394" y="426" font-size="8" fill="#444">strftime(_time,"%H") | where</text>
  <text x="394" y="438" font-size="8" fill="#444">hour&lt;7 OR hour&gt;19</text>
  <text x="394" y="454" font-size="9" font-weight="700" fill="#1a2340">Dashboard: Windows Security Overview</text>
  <text x="394" y="468" font-size="8" fill="#444">Failed Logins · Lockouts · Login Trend</text>
  <text x="394" y="482" font-size="9" font-weight="700" fill="#1a2340">Alert: Brute Force Detection</text>
  <text x="394" y="496" font-size="8" fill="#444">failures &gt; 10 · runs every 15 min</text>
  <text x="394" y="510" font-size="8" fill="#444">→ Add to Triggered Alerts</text>
  <text x="394" y="528" font-size="8.5" fill="#777">Port 8000 · HTTP</text>
  <text x="394" y="541" font-size="8.5" fill="#777">Accessible via browser</text>
  <text x="394" y="554" font-size="8.5" fill="#777">Free licence: 500 MB/day</text>

