# ============================================================
# inputs.conf — Splunk Universal Forwarder Configuration
# Lab 3: Splunk SIEM & Log Analysis
# ============================================================
# FILE LOCATION ON DC01 (Windows Server VM):
#   C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
#
# After saving, restart the forwarder:
#   PowerShell (as Administrator): Restart-Service SplunkForwarder
#
# Receiving Indexer: <Splunk Ubuntu VM private IP>:9997
# Target Index: windows_logs (must be created in Splunk first)
#   Settings → Indexes → Create New Index → name: windows_logs → Save
# ============================================================

# --- Security Event Log ---
# Contains: authentication events, logons, failures, lockouts
# Key Event IDs: 4624 (success) · 4625 (failure) · 4740 (lockout)
[WinEventLog://Security]
disabled = 0
# disabled=0 = enabled. Change to 1 to temporarily stop collecting this source.
index = windows_logs
# Sends events to the windows_logs index on the Splunk indexer.
start_from = oldest
# Collect historical events, not just new events going forward.
current_only = 0
evt_resolve_ad_obj = 1
# Resolve Active Directory SIDs to human-readable usernames.
# Without this, Account_Name fields show S-1-5-... SID strings.

# --- System Event Log ---
# Contains: OS-level events — service starts/stops, driver failures, reboots
[WinEventLog://System]
disabled = 0
index = windows_logs
start_from = oldest
current_only = 0

# --- Application Event Log ---
# Contains: events from installed applications and services
[WinEventLog://Application]
disabled = 0
index = windows_logs
start_from = oldest
current_only = 0
